name: Publish Desktop App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-windows:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install transformers Pillow numpy opencv-python-headless safetensors einops kornia timm huggingface_hub

      - name: Build Python server with PyInstaller
        working-directory: ./bg_remover_desktop
        shell: python
        run: |
          import subprocess, sys, os
          cmd = [
              sys.executable, '-m', 'PyInstaller',
              '--name', 'birefnet_server',
              '--onedir', '--noconfirm', '--clean',
              '--paths', '..',
              '--hidden-import', 'birefnet_model',
              '--hidden-import', 'birefnet_pytorch',
              '--hidden-import', 'torch',
              '--hidden-import', 'torchvision',
              '--hidden-import', 'transformers',
              '--hidden-import', 'huggingface_hub',
              '--hidden-import', 'PIL',
              '--hidden-import', 'numpy',
              '--hidden-import', 'cv2',
              '--hidden-import', 'safetensors',
              '--hidden-import', 'einops',
              '--hidden-import', 'kornia',
              '--hidden-import', 'timm',
              '--collect-submodules', 'torch',
              '--collect-submodules', 'torchvision',
              '--collect-submodules', 'transformers',
              '--collect-submodules', 'safetensors',
              '--collect-submodules', 'timm',
              '--collect-binaries', 'torch',
              '--collect-binaries', 'torchvision',
              # Exclude heavy modules NOT needed for CPU inference
              '--exclude-module', 'torch.distributed',
              '--exclude-module', 'torch.testing',
              '--exclude-module', 'torch.utils.tensorboard',
              '--exclude-module', 'torchaudio',
              '--exclude-module', 'matplotlib',
              '--exclude-module', 'tkinter',
              '--exclude-module', 'pytest',
              '--exclude-module', 'unittest',
              '--exclude-module', 'IPython',
              '--exclude-module', 'jupyter',
              '--exclude-module', 'tensorboard',
              '--exclude-module', 'onnx',
              '--exclude-module', 'onnxruntime',
              '--exclude-module', 'triton',
              '--exclude-module', 'sympy',
              '--exclude-module', 'scipy',
              '--exclude-module', 'pandas',
              'birefnet_server.py'
          ]
          print('Running PyInstaller...')
          result = subprocess.run(cmd, check=True)
          dist_dir = os.path.join('dist', 'birefnet_server')
          if os.path.isdir(dist_dir):
              count = sum(len(files) for _, _, files in os.walk(dist_dir))
              print(f'PyInstaller output: {count} files in {dist_dir}')
          else:
              print(f'ERROR: {dist_dir} does not exist!')
              print('Contents of dist/:', os.listdir('dist') if os.path.isdir('dist') else 'dist/ not found')
              sys.exit(1)

      - name: Trim PyInstaller output (aggressive size reduction)
        working-directory: ./bg_remover_desktop
        shell: python
        run: |
          import os, shutil

          dist = os.path.join('dist', 'birefnet_server')

          def dir_size_mb(path):
              return sum(os.path.getsize(os.path.join(r,f)) for r,_,fs in os.walk(path) for f in fs) / 1024 / 1024

          before = dir_size_mb(dist)
          print(f'Before trim: {before:.0f} MB')

          # 1. Remove CUDA/GPU DLLs (CPU-only build)
          cuda_prefixes = ['cublas', 'cudart', 'cudnn', 'cusparse', 'cufft', 'curand',
                           'nvrtc', 'nvinfer', 'nvjitlink', 'cupti', 'cusolver', 'cublaslt']
          for root, dirs, files in os.walk(dist):
              for f in files:
                  fl = f.lower()
                  if any(fl.startswith(p) for p in cuda_prefixes):
                      os.remove(os.path.join(root, f))

          # 2. Remove heavy torch subpackages not needed for inference
          torch_remove = [
              '_dynamo', '_inductor', '_functorch', 'distributed', 'testing',
              'onnx', 'profiler', '_export', '_higher_order_ops',
              'ao', 'compiler', 'contrib', 'package',
              'utils/tensorboard', 'utils/hipify',
          ]
          for sub in torch_remove:
              p = os.path.join(dist, 'torch', sub)
              if os.path.isdir(p):
                  shutil.rmtree(p, ignore_errors=True)

          # 3. Remove transformers model implementations (we use trust_remote_code)
          models_dir = os.path.join(dist, 'transformers', 'models')
          if os.path.isdir(models_dir):
              # Keep only auto, configuration_utils needed for AutoModel
              keep = {'auto', '__init__.py', '__pycache__'}
              for item in os.listdir(models_dir):
                  if item not in keep:
                      p = os.path.join(models_dir, item)
                      if os.path.isdir(p):
                          shutil.rmtree(p, ignore_errors=True)

          # 4. Remove torchvision bloat (keep only ops and models we need)
          tv_remove = ['datasets', 'io', 'utils', 'transforms/_presets.py']
          for sub in tv_remove:
              p = os.path.join(dist, 'torchvision', sub)
              if os.path.isdir(p):
                  shutil.rmtree(p, ignore_errors=True)

          # 5. Remove test/cache dirs everywhere
          for dname in ['tests', 'test', '__pycache__', '_test', 'testing']:
              for root, dirs, files in os.walk(dist):
                  if dname in dirs:
                      shutil.rmtree(os.path.join(root, dname), ignore_errors=True)
                      dirs.remove(dname)

          # 6. Remove .pdb debug files and .lib static libs
          for root, dirs, files in os.walk(dist):
              for f in files:
                  if f.endswith(('.pdb', '.lib', '.a', '.exp')):
                      os.remove(os.path.join(root, f))

          # 7. Remove large unused DLLs
          large_remove = ['aclml', 'caffe2', 'nvfuser', 'torch_cuda', 'torch_hip']
          for root, dirs, files in os.walk(dist):
              for f in files:
                  fl = f.lower()
                  if any(fl.startswith(p) for p in large_remove):
                      os.remove(os.path.join(root, f))

          after = dir_size_mb(dist)
          print(f'After trim: {after:.0f} MB (saved {before - after:.0f} MB)')

      - name: Move PyInstaller output to python-dist
        working-directory: ./bg_remover_desktop
        run: |
          if (-not (Test-Path "dist/birefnet_server")) {
            Write-Host "ERROR: dist/birefnet_server not found!"
            exit 1
          }
          if (Test-Path python-dist) { Remove-Item -Recurse -Force python-dist }
          New-Item -ItemType Directory -Force -Path python-dist | Out-Null
          Move-Item -Path "dist/birefnet_server" -Destination "python-dist/birefnet_server"
          $size = (Get-ChildItem -Recurse python-dist | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "Python server bundle: $([math]::Round($size, 1)) MB"

      - name: Create .env.production
        working-directory: ./bg_remover_desktop
        shell: python
        run: |
          import os
          lines = [
              f"R2_ENDPOINT={os.environ.get('R2_ENDPOINT', '')}",
              f"R2_ACCESS_KEY={os.environ.get('R2_ACCESS_KEY', '')}",
              f"R2_SECRET_KEY={os.environ.get('R2_SECRET_KEY', '')}",
              f"R2_BUCKET_NAME={os.environ.get('R2_BUCKET_NAME', '')}",
              f"R2_PUBLIC_DOMAIN={os.environ.get('R2_PUBLIC_DOMAIN', '')}",
          ]
          with open('.env.production', 'w') as f:
              f.write('\n'.join(lines) + '\n')
          print('.env.production created')
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_DOMAIN: ${{ secrets.R2_PUBLIC_DOMAIN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './bg_remover_desktop/package-lock.json'

      - name: Install Node dependencies
        working-directory: ./bg_remover_desktop
        run: npm ci

      - name: Copy lottie.min.js to lib
        working-directory: ./bg_remover_desktop
        run: |
          New-Item -ItemType Directory -Force -Path lib | Out-Null
          Copy-Item node_modules/lottie-web/build/player/lottie.min.js lib/lottie.min.js

      - name: Build and Publish Windows
        working-directory: ./bg_remover_desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: npm run release:win

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            bg_remover_desktop/dist/*.exe
            bg_remover_desktop/dist/*.zip
          if-no-files-found: warn

  publish-macos:
    runs-on: macos-14
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install torch torchvision
          pip install transformers Pillow numpy opencv-python-headless safetensors einops kornia timm huggingface_hub

      - name: Build Python server with PyInstaller
        working-directory: ./bg_remover_desktop
        shell: python
        run: |
          import subprocess, sys, os
          cmd = [
              sys.executable, '-m', 'PyInstaller',
              '--name', 'birefnet_server',
              '--onedir', '--noconfirm', '--clean',
              '--paths', '..',
              '--hidden-import', 'birefnet_model',
              '--hidden-import', 'birefnet_pytorch',
              '--hidden-import', 'torch',
              '--hidden-import', 'torchvision',
              '--hidden-import', 'transformers',
              '--hidden-import', 'huggingface_hub',
              '--hidden-import', 'PIL',
              '--hidden-import', 'numpy',
              '--hidden-import', 'cv2',
              '--hidden-import', 'safetensors',
              '--hidden-import', 'einops',
              '--hidden-import', 'kornia',
              '--hidden-import', 'timm',
              '--collect-submodules', 'torch',
              '--collect-submodules', 'torchvision',
              '--collect-submodules', 'transformers',
              '--collect-submodules', 'safetensors',
              '--collect-submodules', 'timm',
              '--collect-binaries', 'torch',
              '--collect-binaries', 'torchvision',
              # Exclude heavy modules NOT needed for CPU inference
              '--exclude-module', 'torch.distributed',
              '--exclude-module', 'torch.testing',
              '--exclude-module', 'torch.utils.tensorboard',
              '--exclude-module', 'torchaudio',
              '--exclude-module', 'matplotlib',
              '--exclude-module', 'tkinter',
              '--exclude-module', 'pytest',
              '--exclude-module', 'unittest',
              '--exclude-module', 'IPython',
              '--exclude-module', 'jupyter',
              '--exclude-module', 'tensorboard',
              '--exclude-module', 'onnx',
              '--exclude-module', 'onnxruntime',
              '--exclude-module', 'triton',
              '--exclude-module', 'sympy',
              '--exclude-module', 'scipy',
              '--exclude-module', 'pandas',
              'birefnet_server.py'
          ]
          print('Running PyInstaller...')
          result = subprocess.run(cmd, check=True)
          dist_dir = os.path.join('dist', 'birefnet_server')
          if os.path.isdir(dist_dir):
              count = sum(len(files) for _, _, files in os.walk(dist_dir))
              print(f'PyInstaller output: {count} files in {dist_dir}')
          else:
              print(f'ERROR: {dist_dir} does not exist!')
              print('Contents of dist/:', os.listdir('dist') if os.path.isdir('dist') else 'dist/ not found')
              sys.exit(1)

      - name: Trim PyInstaller output (aggressive size reduction)
        working-directory: ./bg_remover_desktop
        shell: python
        run: |
          import os, shutil

          dist = os.path.join('dist', 'birefnet_server')

          def dir_size_mb(path):
              return sum(os.path.getsize(os.path.join(r,f)) for r,_,fs in os.walk(path) for f in fs) / 1024 / 1024

          before = dir_size_mb(dist)
          print(f'Before trim: {before:.0f} MB')

          # 1. Remove heavy torch subpackages not needed for inference
          torch_remove = [
              '_dynamo', '_inductor', '_functorch', 'distributed', 'testing',
              'onnx', 'profiler', '_export', '_higher_order_ops',
              'ao', 'compiler', 'contrib', 'package',
              'utils/tensorboard', 'utils/hipify',
          ]
          for sub in torch_remove:
              p = os.path.join(dist, 'torch', sub)
              if os.path.isdir(p):
                  shutil.rmtree(p, ignore_errors=True)

          # 2. Remove transformers model implementations (we use trust_remote_code)
          models_dir = os.path.join(dist, 'transformers', 'models')
          if os.path.isdir(models_dir):
              keep = {'auto', '__init__.py', '__pycache__'}
              for item in os.listdir(models_dir):
                  if item not in keep:
                      p = os.path.join(models_dir, item)
                      if os.path.isdir(p):
                          shutil.rmtree(p, ignore_errors=True)

          # 3. Remove torchvision bloat
          tv_remove = ['datasets', 'io', 'utils', 'transforms/_presets.py']
          for sub in tv_remove:
              p = os.path.join(dist, 'torchvision', sub)
              if os.path.isdir(p):
                  shutil.rmtree(p, ignore_errors=True)

          # 4. Remove test/cache dirs everywhere
          for dname in ['tests', 'test', '__pycache__', '_test', 'testing']:
              for root, dirs, files in os.walk(dist):
                  if dname in dirs:
                      shutil.rmtree(os.path.join(root, dname), ignore_errors=True)
                      dirs.remove(dname)

          # 5. Remove debug files
          for root, dirs, files in os.walk(dist):
              for f in files:
                  if f.endswith(('.pdb', '.lib', '.a', '.exp', '.dSYM')):
                      fp = os.path.join(root, f)
                      if os.path.isfile(fp):
                          os.remove(fp)

          # 6. Remove large unused libs
          large_remove = ['caffe2', 'nvfuser', 'torch_cuda', 'torch_hip']
          for root, dirs, files in os.walk(dist):
              for f in files:
                  fl = f.lower()
                  if any(fl.startswith(p) for p in large_remove):
                      os.remove(os.path.join(root, f))

          after = dir_size_mb(dist)
          print(f'After trim: {after:.0f} MB (saved {before - after:.0f} MB)')

      - name: Move PyInstaller output to python-dist
        working-directory: ./bg_remover_desktop
        run: |
          if [ ! -d "dist/birefnet_server" ]; then
            echo "ERROR: dist/birefnet_server not found!"
            exit 1
          fi
          rm -rf python-dist
          mkdir -p python-dist
          mv dist/birefnet_server python-dist/birefnet_server
          echo "Python server bundle: $(du -sh python-dist | cut -f1)"

      - name: Create .env.production
        working-directory: ./bg_remover_desktop
        shell: python
        run: |
          import os
          lines = [
              f"R2_ENDPOINT={os.environ.get('R2_ENDPOINT', '')}",
              f"R2_ACCESS_KEY={os.environ.get('R2_ACCESS_KEY', '')}",
              f"R2_SECRET_KEY={os.environ.get('R2_SECRET_KEY', '')}",
              f"R2_BUCKET_NAME={os.environ.get('R2_BUCKET_NAME', '')}",
              f"R2_PUBLIC_DOMAIN={os.environ.get('R2_PUBLIC_DOMAIN', '')}",
          ]
          with open('.env.production', 'w') as f:
              f.write('\n'.join(lines) + '\n')
          print('.env.production created')
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_DOMAIN: ${{ secrets.R2_PUBLIC_DOMAIN }}

