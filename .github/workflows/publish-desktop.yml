name: Publish Desktop App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-windows:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install transformers Pillow numpy opencv-python-headless safetensors einops kornia timm

      - name: Pre-download model and resolve symlinks
        working-directory: ./bg_remover_desktop
        shell: python
        run: |
          import os, shutil
          from transformers import AutoModelForImageSegmentation
          # Download model to a temp cache
          tmp_cache = os.path.join('.', '_tmp_model_cache')
          os.makedirs(tmp_cache, exist_ok=True)
          print('Downloading BiRefNet_lite model...')
          model = AutoModelForImageSegmentation.from_pretrained(
              'ZhengPeng7/BiRefNet_lite',
              trust_remote_code=True,
              cache_dir=tmp_cache
          )
          del model
          print('Model downloaded.')
          # Copy with symlinks resolved (dereferenced) to avoid 7-Zip crash
          resolved_cache = os.path.join('.', 'model_cache')
          if os.path.exists(resolved_cache):
              shutil.rmtree(resolved_cache)
          shutil.copytree(tmp_cache, resolved_cache, symlinks=False)
          shutil.rmtree(tmp_cache)
          # Verify
          total_size = sum(
              os.path.getsize(os.path.join(dp, f))
              for dp, dn, filenames in os.walk(resolved_cache)
              for f in filenames
          )
          print(f'Model cache ready: {total_size / 1024 / 1024:.1f} MB (symlinks resolved)')

      - name: Build Python server with PyInstaller
        working-directory: ./bg_remover_desktop
        shell: python
        run: |
          import subprocess, sys, os
          cmd = [
              sys.executable, '-m', 'PyInstaller',
              '--name', 'birefnet_server',
              '--onedir', '--noconfirm', '--clean',
              '--paths', '..',
              '--add-data', 'model_cache;model_cache',
              '--hidden-import', 'birefnet_model',
              '--hidden-import', 'birefnet_pytorch',
              '--hidden-import', 'torch',
              '--hidden-import', 'torchvision',
              '--hidden-import', 'transformers',
              '--hidden-import', 'PIL',
              '--hidden-import', 'numpy',
              '--hidden-import', 'cv2',
              '--hidden-import', 'safetensors',
              '--hidden-import', 'einops',
              '--hidden-import', 'kornia',
              '--hidden-import', 'timm',
              '--collect-submodules', 'torch',
              '--collect-submodules', 'transformers',
              '--collect-submodules', 'safetensors',
              '--collect-submodules', 'timm',
              '--collect-binaries', 'torch',
              'birefnet_server.py'
          ]
          print('Running PyInstaller...')
          result = subprocess.run(cmd, check=True)
          dist_dir = os.path.join('dist', 'birefnet_server')
          if os.path.isdir(dist_dir):
              count = sum(len(files) for _, _, files in os.walk(dist_dir))
              print(f'PyInstaller output: {count} files in {dist_dir}')
          else:
              print(f'ERROR: {dist_dir} does not exist!')
              print('Contents of dist/:', os.listdir('dist') if os.path.isdir('dist') else 'dist/ not found')
              sys.exit(1)

      - name: Move PyInstaller output to python-dist
        working-directory: ./bg_remover_desktop
        run: |
          if (-not (Test-Path "dist/birefnet_server")) {
            Write-Host "ERROR: dist/birefnet_server not found!"
            exit 1
          }
          if (Test-Path python-dist) { Remove-Item -Recurse -Force python-dist }
          New-Item -ItemType Directory -Force -Path python-dist | Out-Null
          Move-Item -Path "dist/birefnet_server" -Destination "python-dist/birefnet_server"
          $size = (Get-ChildItem -Recurse python-dist | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "Python server bundle: $([math]::Round($size, 1)) MB"

      - name: Create .env.production
        working-directory: ./bg_remover_desktop
        shell: python
        run: |
          import os
          lines = [
              f"R2_ENDPOINT={os.environ.get('R2_ENDPOINT', '')}",
              f"R2_ACCESS_KEY={os.environ.get('R2_ACCESS_KEY', '')}",
              f"R2_SECRET_KEY={os.environ.get('R2_SECRET_KEY', '')}",
              f"R2_BUCKET_NAME={os.environ.get('R2_BUCKET_NAME', '')}",
              f"R2_PUBLIC_DOMAIN={os.environ.get('R2_PUBLIC_DOMAIN', '')}",
          ]
          with open('.env.production', 'w') as f:
              f.write('\n'.join(lines) + '\n')
          print('.env.production created')
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_DOMAIN: ${{ secrets.R2_PUBLIC_DOMAIN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './bg_remover_desktop/package-lock.json'

      - name: Install Node dependencies
        working-directory: ./bg_remover_desktop
        run: npm ci

      - name: Copy lottie.min.js to lib
        working-directory: ./bg_remover_desktop
        run: |
          New-Item -ItemType Directory -Force -Path lib | Out-Null
          Copy-Item node_modules/lottie-web/build/player/lottie.min.js lib/lottie.min.js

      - name: Build and Publish Windows
        working-directory: ./bg_remover_desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: npm run release:win

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            bg_remover_desktop/dist/*.exe
            bg_remover_desktop/dist/*.zip
          if-no-files-found: warn

  publish-macos:
    runs-on: macos-14
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install torch torchvision
          pip install transformers Pillow numpy opencv-python-headless safetensors einops kornia timm

      - name: Pre-download model and resolve symlinks
        working-directory: ./bg_remover_desktop
        shell: python
        run: |
          import os, shutil
          from transformers import AutoModelForImageSegmentation
          tmp_cache = os.path.join('.', '_tmp_model_cache')
          os.makedirs(tmp_cache, exist_ok=True)
          print('Downloading BiRefNet_lite model...')
          model = AutoModelForImageSegmentation.from_pretrained(
              'ZhengPeng7/BiRefNet_lite',
              trust_remote_code=True,
              cache_dir=tmp_cache
          )
          del model
          print('Model downloaded.')
          resolved_cache = os.path.join('.', 'model_cache')
          if os.path.exists(resolved_cache):
              shutil.rmtree(resolved_cache)
          shutil.copytree(tmp_cache, resolved_cache, symlinks=False)
          shutil.rmtree(tmp_cache)
          total_size = sum(
              os.path.getsize(os.path.join(dp, f))
              for dp, dn, filenames in os.walk(resolved_cache)
              for f in filenames
          )
          print(f'Model cache ready: {total_size / 1024 / 1024:.1f} MB (symlinks resolved)')

      - name: Build Python server with PyInstaller
        working-directory: ./bg_remover_desktop
        shell: python
        run: |
          import subprocess, sys, os
          cmd = [
              sys.executable, '-m', 'PyInstaller',
              '--name', 'birefnet_server',
              '--onedir', '--noconfirm', '--clean',
              '--paths', '..',
              '--add-data', 'model_cache:model_cache',
              '--hidden-import', 'birefnet_model',
              '--hidden-import', 'birefnet_pytorch',
              '--hidden-import', 'torch',
              '--hidden-import', 'torchvision',
              '--hidden-import', 'transformers',
              '--hidden-import', 'PIL',
              '--hidden-import', 'numpy',
              '--hidden-import', 'cv2',
              '--hidden-import', 'safetensors',
              '--hidden-import', 'einops',
              '--hidden-import', 'kornia',
              '--hidden-import', 'timm',
              '--collect-submodules', 'torch',
              '--collect-submodules', 'transformers',
              '--collect-submodules', 'safetensors',
              '--collect-submodules', 'timm',
              '--collect-binaries', 'torch',
              'birefnet_server.py'
          ]
          print('Running PyInstaller...')
          result = subprocess.run(cmd, check=True)
          dist_dir = os.path.join('dist', 'birefnet_server')
          if os.path.isdir(dist_dir):
              count = sum(len(files) for _, _, files in os.walk(dist_dir))
              print(f'PyInstaller output: {count} files in {dist_dir}')
          else:
              print(f'ERROR: {dist_dir} does not exist!')
              print('Contents of dist/:', os.listdir('dist') if os.path.isdir('dist') else 'dist/ not found')
              sys.exit(1)

      - name: Move PyInstaller output to python-dist
        working-directory: ./bg_remover_desktop
        run: |
          if [ ! -d "dist/birefnet_server" ]; then
            echo "ERROR: dist/birefnet_server not found!"
            exit 1
          fi
          rm -rf python-dist
          mkdir -p python-dist
          mv dist/birefnet_server python-dist/birefnet_server
          echo "Python server bundle: $(du -sh python-dist | cut -f1)"

      - name: Create .env.production
        working-directory: ./bg_remover_desktop
        shell: python
        run: |
          import os
          lines = [
              f"R2_ENDPOINT={os.environ.get('R2_ENDPOINT', '')}",
              f"R2_ACCESS_KEY={os.environ.get('R2_ACCESS_KEY', '')}",
              f"R2_SECRET_KEY={os.environ.get('R2_SECRET_KEY', '')}",
              f"R2_BUCKET_NAME={os.environ.get('R2_BUCKET_NAME', '')}",
              f"R2_PUBLIC_DOMAIN={os.environ.get('R2_PUBLIC_DOMAIN', '')}",
          ]
          with open('.env.production', 'w') as f:
              f.write('\n'.join(lines) + '\n')
          print('.env.production created')
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_DOMAIN: ${{ secrets.R2_PUBLIC_DOMAIN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './bg_remover_desktop/package-lock.json'

      - name: Install Node dependencies
        working-directory: ./bg_remover_desktop
        run: npm ci

      - name: Copy lottie.min.js to lib
        working-directory: ./bg_remover_desktop
        run: |
          mkdir -p lib
          cp node_modules/lottie-web/build/player/lottie.min.js lib/lottie.min.js

      - name: Build and Publish macOS ARM
        working-directory: ./bg_remover_desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max-old-space-size=8192'
          npm_config_arch: arm64
        run: npm run release:mac

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm-installer
          path: |
            bg_remover_desktop/dist/*.dmg
            bg_remover_desktop/dist/*.zip
          if-no-files-found: warn
