name: Build Electron App

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'bg remover desktop/package-lock.json'

      - name: Install dependencies
        run: npm install
        working-directory: "./bg remover desktop"

      - name: Rebuild native modules for Electron
        run: |
          npm install -g @electron/rebuild
          npx @electron/rebuild
        working-directory: "./bg remover desktop"

      - name: Build Windows app
        run: npm run build:win
        working-directory: "./bg remover desktop"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: BG-Remover-Windows
          path: |
            ./bg remover desktop/dist/*.exe
            ./bg remover desktop/dist/*.exe.blockmap
            ./bg remover desktop/dist/latest.yml
          retention-days: 30

  build-mac:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            arch: x64
          - os: macos-14
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'bg remover desktop/package-lock.json'

      - name: Install dependencies
        run: npm install
        working-directory: "./bg remover desktop"

      - name: Rebuild native modules for Electron
        run: |
          npm install -g @electron/rebuild
          npx @electron/rebuild
        working-directory: "./bg remover desktop"

      - name: Build macOS app (${{ matrix.arch }})
        run: npx electron-builder --mac --${{ matrix.arch }} --publish never
        working-directory: "./bg remover desktop"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: BG-Remover-macOS-${{ matrix.arch }}
          path: |
            ./bg remover desktop/dist/*.dmg
            ./bg remover desktop/dist/*.dmg.blockmap
            ./bg remover desktop/dist/*.zip
            ./bg remover desktop/dist/*.zip.blockmap
            ./bg remover desktop/dist/latest-mac*.yml
          retention-days: 30

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: BG-Remover-Windows
          path: ./windows

      - name: Download macOS x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: BG-Remover-macOS-x64
          path: ./macos-x64

      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: BG-Remover-macOS-arm64
          path: ./macos-arm64

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./windows/*.exe
            ./windows/*.exe.blockmap
            ./windows/latest.yml
            ./macos-x64/*.dmg
            ./macos-x64/*.dmg.blockmap
            ./macos-x64/*.zip
            ./macos-x64/*.zip.blockmap
            ./macos-x64/latest-mac*.yml
            ./macos-arm64/*.dmg
            ./macos-arm64/*.dmg.blockmap
            ./macos-arm64/*.zip
            ./macos-arm64/*.zip.blockmap
            ./macos-arm64/latest-mac*.yml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

