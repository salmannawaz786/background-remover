name: Build Electron App

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'bg remover desktop/package-lock.json'

      - name: Install dependencies
        run: npm install
        working-directory: "./bg remover desktop"

      - name: Rebuild native modules for Electron
        run: |
          npm install -g @electron/rebuild
          npx @electron/rebuild
        working-directory: "./bg remover desktop"

      - name: Build/Publish Windows app
        run: |
          if ("${{ github.ref }}" -like "refs/tags/v*") {
            npm run publish:win
          } else {
            npm run build:win
          }
        shell: pwsh
        working-directory: "./bg remover desktop"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: BG-Remover-Windows
          path: |
            ./bg remover desktop/dist/*.exe
            ./bg remover desktop/dist/*.exe.blockmap
            ./bg remover desktop/dist/latest.yml
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'bg remover desktop/package-lock.json'

      - name: Install dependencies
        run: npm install
        working-directory: "./bg remover desktop"

      - name: Rebuild native modules for Electron
        run: |
          npm install -g @electron/rebuild
          npx @electron/rebuild
        working-directory: "./bg remover desktop"

      - name: Build/Publish macOS app
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            npm run publish:mac
          else
            npm run build:mac
          fi
        working-directory: "./bg remover desktop"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: BG-Remover-macOS
          path: |
            ./bg remover desktop/dist/*.dmg
            ./bg remover desktop/dist/*.dmg.blockmap
            ./bg remover desktop/dist/*.zip
            ./bg remover desktop/dist/*.zip.blockmap
            ./bg remover desktop/dist/latest-mac.yml
          retention-days: 30

