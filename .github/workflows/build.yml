name: Build Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'bg remover desktop/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: "./bg remover desktop"

      - name: Build Windows app
        run: npx electron-builder --win --publish never
        working-directory: "./bg remover desktop"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: BG-Remover-Windows
          path: |
            ./bg remover desktop/dist/*.exe
            ./bg remover desktop/dist/*.exe.blockmap
            ./bg remover desktop/dist/latest.yml
          retention-days: 30

  build-mac-x64:
    runs-on: macos-13
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'bg remover desktop/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: "./bg remover desktop"

      - name: Build macOS x64 app
        run: npx electron-builder --mac --x64 --publish never
        working-directory: "./bg remover desktop"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: BG-Remover-macOS-x64
          path: |
            ./bg remover desktop/dist/*.dmg
            ./bg remover desktop/dist/*.dmg.blockmap
            ./bg remover desktop/dist/*.zip
            ./bg remover desktop/dist/*.zip.blockmap
            ./bg remover desktop/dist/latest-mac*.yml
          retention-days: 30

  build-mac-arm64:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'bg remover desktop/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: "./bg remover desktop"

      - name: Build macOS arm64 app
        run: npx electron-builder --mac --arm64 --publish never
        working-directory: "./bg remover desktop"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: BG-Remover-macOS-arm64
          path: |
            ./bg remover desktop/dist/*.dmg
            ./bg remover desktop/dist/*.dmg.blockmap
            ./bg remover desktop/dist/*.zip
            ./bg remover desktop/dist/*.zip.blockmap
            ./bg remover desktop/dist/latest-mac*.yml
          retention-days: 30

  release:
    needs: [build-windows, build-mac-x64, build-mac-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List artifacts
        run: find ./artifacts -type f | head -50

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/BG-Remover-Windows/*.exe
            ./artifacts/BG-Remover-Windows/*.exe.blockmap
            ./artifacts/BG-Remover-Windows/latest.yml
            ./artifacts/BG-Remover-macOS-x64/*.dmg
            ./artifacts/BG-Remover-macOS-x64/*.dmg.blockmap
            ./artifacts/BG-Remover-macOS-x64/*.zip
            ./artifacts/BG-Remover-macOS-x64/*.zip.blockmap
            ./artifacts/BG-Remover-macOS-x64/latest-mac*.yml
            ./artifacts/BG-Remover-macOS-arm64/*.dmg
            ./artifacts/BG-Remover-macOS-arm64/*.dmg.blockmap
            ./artifacts/BG-Remover-macOS-arm64/*.zip
            ./artifacts/BG-Remover-macOS-arm64/*.zip.blockmap
            ./artifacts/BG-Remover-macOS-arm64/latest-mac*.yml
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

