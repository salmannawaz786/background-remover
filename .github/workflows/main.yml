name: Build Electron App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install
        working-directory: ./bg remover desktop
      - run: npm run build:win
        working-directory: ./bg remover desktop
      - uses: actions/upload-artifact@v4
        with:
          name: BG-Remover-Windows
          path: ./bg remover desktop/dist/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install
        working-directory: ./bg remover desktop
      - run: npm run build:mac
        working-directory: ./bg remover desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: BG-Remover-macOS
          path: ./bg remover desktop/dist/*.dmg
