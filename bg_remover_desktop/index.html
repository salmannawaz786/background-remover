<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: file: https: blob:; connect-src 'self' data: blob: https://*.firebaseio.com https://*.googleapis.com https://*.firebaseapp.com https://*.r2.cloudflarestorage.com https://*.r2.dev; frame-src 'none';">
    <title>BG Remover - Desktop</title>
    <link rel="stylesheet" href="styles.css">
    <script src="lib/lottie.min.js"></script>
</head>
<body>
    <!-- Splash Screen -->
    <div class="splash-screen" id="splashScreen">
        <div class="splash-content">
            <div class="splash-lottie" id="splashLottie"></div>
            <p class="splash-loading-text">Loading AI Engine...</p>
            <div class="splash-tip-row" id="splashTipRow">
                <span class="splash-bulb">💡</span>
                <div class="splash-tip-content" id="splashTipContent"></div>
            </div>
        </div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <img src="assets/logo.png" alt="Logo" class="logo-img">
                <span class="logo-text">BG Remover</span>
                <span class="badge">DESKTOP</span>
            </div>
            <div class="header-actions">
                <span id="user-info" style="display: none; margin-right: 15px; color: var(--text-secondary); font-size: 14px;"></span>
                <button id="logout-btn" class="logout-btn" style="margin-right: 10px; padding: 8px 16px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 14px;">Logout</button>
                <button class="theme-toggle" id="theme-toggle">
                    <span class="sun-icon">☀️</span>
                    <span class="moon-icon">🌙</span>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div class="container">
                <h1>Remove Background <span class="highlight">Instantly</span></h1>
                <p class="subtitle">100% offline • No internet required • Your images stay private</p>

                <!-- Mode Selector -->
                <div class="mode-selector">
                    <button class="mode-btn active" data-mode="single">Single Image</button>
                    <button class="mode-btn" data-mode="batch">Multiple Images</button>
                    <!-- Speed / HD Mode Toggle -->
                    <div class="quality-toggle">
                        <span class="toggle-label speed-label">Speed</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="hd-mode-toggle" />
                            <span class="toggle-slider"></span>
                        </label>
                        <span class="toggle-label hd-label">HD</span>
                    </div>
                </div>
                <!-- Device Info -->
                <div class="device-badge" id="device-badge">
                    <span class="device-icon" id="device-icon"></span>
                    <span id="device-name">Detecting...</span>
                </div>

                <!-- Upload Area -->
                <div class="upload-area" id="upload-area">
                    <div class="upload-content">
                        <div class="upload-icon">📁</div>
                        <h3>Drop your image here</h3>
                        <p>or click to browse</p>
                        <button class="upload-btn" id="upload-btn">Select Image</button>
                    </div>
                </div>

                <!-- Processing Indicator -->
                <div class="processing" id="processing" style="display: none;">
                    <div class="loading-circle">
                        <div class="circle-spinner"></div>
                    </div>
                    <p class="processing-text">Processing your image...</p>
                </div>

                <!-- Results - Single Image -->
                <div class="results-container" id="results-container" style="display: none;">
                    <div class="comparison-wrapper">
                        <div class="comparison-item">
                            <span class="comparison-label before">Before</span>
                            <img id="original-image" src="" alt="Original">
                        </div>
                        <div class="comparison-item">
                            <span class="comparison-label after">After</span>
                            <img id="result-image" src="" alt="Result">
                        </div>
                    </div>
                    <div class="action-buttons">
                        <button class="btn btn-secondary" id="new-image-btn">New Image</button>
                        <button class="btn btn-primary" id="download-btn">Download PNG</button>
                    </div>
                </div>

                <!-- Results - Batch -->
                <div class="batch-container" id="batch-container" style="display: none;">
                    <div class="batch-grid" id="batch-grid"></div>
                    <div class="action-buttons">
                        <button class="btn btn-secondary" id="new-batch-btn">New Batch</button>
                        <button class="btn btn-primary" id="process-batch-btn">Process All</button>
                        <button class="btn btn-success" id="download-all-btn" style="display: none;">Download All</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>Made with love (❤️) by <a href="https://sallulabs.com" target="_blank">Salman</a></p>
        </footer>
    </div>

    <!-- Initialize Firebase Auth (Storage removed - using R2 instead) -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
        import { getAuth, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';
        
        console.log('🔄 Initializing Firebase Auth...');
        
        const firebaseConfig = {
            apiKey: "AIzaSyA8D2w0J8auihu3BbR8McIpoSduDfI2jxo",
            authDomain: "are-you-genius-1f253.firebaseapp.com",
            projectId: "are-you-genius-1f253",
            storageBucket: "imagetotext-4c3e3.appspot.com",
            messagingSenderId: "771421054895",
            appId: "1:771421054895:web:7a27a9c69f722069ebb15a"
        };
        
        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            
            // Export globally (Auth only, no Storage)
            window.firebaseAuth = auth;
            window.firebaseApp = app;
            
            console.log('✅ Firebase Auth initialized!');
            
            // Check if user session exists from localStorage (set during login)
            const storedUser = localStorage.getItem('user');
            const storedToken = localStorage.getItem('token');
            
            if (storedUser && storedToken) {
                console.log('✓ Found stored user session');
                window.firebaseUser = JSON.parse(storedUser);
                window.firebaseToken = storedToken;
            }
            
            // Listen for auth state changes
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    console.log('✅ Firebase Auth: User signed in:', user.email);
                    window.firebaseAuthUser = user;
                } else {
                    console.log('⚠️ Firebase Auth: No user');
                }
            });
            
        } catch (error) {
            console.error('❌ Firebase Auth init error:', error);
        }
    </script>
    
    <!-- Load renderer AFTER Firebase is ready -->
    <script src="renderer.js"></script>
</body>
</html>
