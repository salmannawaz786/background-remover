<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://www.gstatic.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com; img-src 'self' data: https:;">
    <title>Reset Password - SalluLabs</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .reset-container {
            max-width: 450px;
            margin: 80px auto;
            padding: 40px;
            background: var(--bg-card);
            border-radius: 20px;
            box-shadow: 0 8px 30px var(--shadow);
            text-align: center;
        }

        .reset-header {
            margin-bottom: 30px;
        }

        .reset-header h1 {
            font-size: 32px;
            color: var(--text-primary);
            margin: 0 0 10px 0;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .reset-header p {
            color: var(--text-secondary);
            font-size: 14px;
            margin: 0;
        }

        .email-display {
            background: var(--bg-secondary);
            padding: 12px 20px;
            border-radius: 8px;
            margin: 20px 0;
            color: var(--text-primary);
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 14px;
        }

        .password-input-wrapper {
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 14px 45px 14px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(250, 204, 21, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 20px;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-password:hover {
            color: var(--text-primary);
        }

        .password-requirements {
            text-align: left;
            margin-top: 10px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .password-requirements ul {
            margin: 5px 0;
            padding-left: 20px;
        }

        .password-requirements li {
            margin: 3px 0;
        }

        .password-requirements li.valid {
            color: #10b981;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--text-dark);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(250, 204, 21, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .message.success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--text-dark);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .success-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .back-to-app {
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .back-to-app a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .back-to-app a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-header">
            <h1>🔐 Reset Password</h1>
            <p>SalluLabs BG Remover</p>
        </div>

        <div id="message" class="message"></div>

        <div id="reset-form-container">
            <div class="email-display" id="user-email">Loading...</div>

            <form id="reset-form">
                <div class="form-group">
                    <label for="new-password">New Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="new-password" required minlength="6" placeholder="Enter new password">
                        <button type="button" class="toggle-password" id="toggle-password">
                            👁️
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="confirm-password" required minlength="6" placeholder="Confirm new password">
                        <button type="button" class="toggle-password" id="toggle-confirm">
                            👁️
                        </button>
                    </div>
                </div>

                <div class="password-requirements">
                    <strong>Password must:</strong>
                    <ul>
                        <li id="req-length">Be at least 6 characters long</li>
                        <li id="req-match">Match confirmation password</li>
                    </ul>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">
                    Reset Password
                </button>
            </form>
        </div>

        <div id="success-container" style="display: none;">
            <div class="success-icon">✅</div>
            <h2 style="color: var(--text-primary); margin-bottom: 10px;">Password Reset Successful!</h2>
            <p style="color: var(--text-secondary); margin-bottom: 20px;">
                Your password has been updated. You can now log in with your new password.
            </p>
            <div class="back-to-app">
                <a href="#" onclick="window.close(); return false;">Close this window</a>
            </div>
        </div>
    </div>

    <script type="module">
        // Import Firebase modules
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
        import { getAuth, verifyPasswordResetCode, confirmPasswordReset } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyA8D2w0J8auihu3BbR8McIpoSduDfI2jxo",
            authDomain: "are-you-genius-1f253.firebaseapp.com",
            projectId: "are-you-genius-1f253",
            storageBucket: "are-you-genius-1f253.firebasestorage.app",
            messagingSenderId: "771421054895",
            appId: "1:771421054895:web:7a27a9c69f722069ebb15a",
            measurementId: "G-RE3R9WGMH9"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // UI Elements
        const messageDiv = document.getElementById('message');
        const resetFormContainer = document.getElementById('reset-form-container');
        const successContainer = document.getElementById('success-container');
        const resetForm = document.getElementById('reset-form');
        const userEmailDiv = document.getElementById('user-email');
        const newPasswordInput = document.getElementById('new-password');
        const confirmPasswordInput = document.getElementById('confirm-password');
        const submitBtn = document.getElementById('submit-btn');

        // Get oobCode from URL
        const urlParams = new URLSearchParams(window.location.search);
        const oobCode = urlParams.get('oobCode');

        // Show message
        function showMessage(message, type = 'error') {
            messageDiv.textContent = message;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        // Password validation
        function validatePassword() {
            const password = newPasswordInput.value;
            const confirm = confirmPasswordInput.value;
            
            const lengthValid = password.length >= 6;
            const matchValid = password === confirm && password.length > 0;
            
            document.getElementById('req-length').className = lengthValid ? 'valid' : '';
            document.getElementById('req-match').className = matchValid ? 'valid' : '';
            
            return lengthValid && matchValid;
        }

        newPasswordInput.addEventListener('input', validatePassword);
        confirmPasswordInput.addEventListener('input', validatePassword);

        // Toggle password visibility
        document.getElementById('toggle-password').addEventListener('click', () => {
            const type = newPasswordInput.type === 'password' ? 'text' : 'password';
            newPasswordInput.type = type;
        });

        document.getElementById('toggle-confirm').addEventListener('click', () => {
            const type = confirmPasswordInput.type === 'password' ? 'text' : 'password';
            confirmPasswordInput.type = type;
        });

        // Verify reset code and get email
        async function verifyCode() {
            if (!oobCode) {
                showMessage('Invalid or missing reset code. Please request a new password reset link.');
                return;
            }

            try {
                const email = await verifyPasswordResetCode(auth, oobCode);
                userEmailDiv.textContent = `for ${email}`;
            } catch (error) {
                console.error('Verification error:', error);
                showMessage('This password reset link is invalid or has expired. Please request a new one.');
                resetForm.style.display = 'none';
            }
        }

        // Handle form submission
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!validatePassword()) {
                showMessage('Please ensure your password meets all requirements.');
                return;
            }

            const newPassword = newPasswordInput.value;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span>Resetting...';

            try {
                await confirmPasswordReset(auth, oobCode, newPassword);
                
                // Show success
                resetFormContainer.style.display = 'none';
                successContainer.style.display = 'block';
                
                // Auto-close after 5 seconds
                setTimeout(() => {
                    window.close();
                }, 5000);
            } catch (error) {
                console.error('Reset error:', error);
                let errorMessage = 'Failed to reset password. ';
                
                if (error.code === 'auth/expired-action-code') {
                    errorMessage += 'This link has expired. Please request a new one.';
                } else if (error.code === 'auth/invalid-action-code') {
                    errorMessage += 'This link is invalid. Please request a new one.';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage += 'Password is too weak. Use at least 6 characters.';
                } else {
                    errorMessage += error.message;
                }
                
                showMessage(errorMessage);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });

        // Initialize
        verifyCode();
    </script>
</body>
</html>
