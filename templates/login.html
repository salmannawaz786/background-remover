<!-- login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/static/auth.css">
    <link rel="stylesheet" href="style.css">
    <script type="application/ld+json">
        {
          "@context": "https://schema.org",
          "@type": "Organization",
          "name": "SalluLabs",
          "url": "https://sallulabs.com/login",
          "logo": "https://sallulabs.com/static/images/s.png",
          "description": "AI-powered tools for boosting productivity and creativity",
          "contactPoint": {
            "@type": "ContactPoint",
            "telephone": "+92 3102791036",
            "contactType": "customer service"
          },
          "sameAs": [
            "https://twitter.com/SalluLabs",
            "https://github.com/SalluLabs",
            "https://linkedin.com/company/SalluLabs"
          ]
        }
    </script>
</head>
<body>
    <div class="wrapper">
        <div class="auth-header">
            <h2>Login to your SalluLabs account</h2>
        </div>
        
        <div id="error-message" style="display: none;"></div>
        <form id="loginForm">
            <div>
                <label for="email">@</label>
                <input type="email" id="email" name="email" required placeholder="Email">
            </div>

            <div>
                <label for="password">
                    <svg class="i" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#white"><path d="M480-480q-66 0-113-47t-47-113q0-66 47-113t113-47q66 0 113 47t47 113q0 66-47 113t-113 47ZM160-160v-112q0-34 17.5-62.5T224-378q62-31 126-46.5T480-440q66 0 130 15.5T736-378q29 15 46.5 43.5T800-272v112H160Zm80-80h480v-32q0-11-5.5-20T700-306q-54-27-109-40.5T480-360q-56 0-111 13.5T260-306q-9 5-14.5 14t-5.5 20v32Zm240-320q33 0 56.5-23.5T560-640q0-33-23.5-56.5T480-720q-33 0-56.5 23.5T400-640q0 33 23.5 56.5T480-560Zm0-80Zm0 400Z"/></svg>
                </label>
                <input type="password" id="password" name="password" required placeholder="Password">
            </div>

            <button type="submit">Sign In</button>

            <button type="button" id="google-login" class="google">
                Continue with Google
            </button>
        </form>
        
        <p>
            Don't have an account? <a href="/signup">Sign Up</a>
        </p>
    </div>
    
    <script type="module" src="/static/firebaseauth.js"></script>
    <!-- Existing Cloudflare script remains unchanged -->
</body>
</html>
