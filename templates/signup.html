<!-- signup.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="/static/auth.css">
    <script type="application/ld+json">
        {
          "@context": "https://schema.org",
          "@type": "Organization",
          "name": "SalluLabs",
          "url": "https://sallulabs.com/signup",
          "logo": "https://sallulabs.com/static/images/s.png",
          "description": "AI-powered tools for boosting productivity and creativity",
          "contactPoint": {
            "@type": "ContactPoint",
            "telephone": "+92 3102791036",
            "contactType": "customer service"
          },
          "sameAs": [
            "https://twitter.com/SalluLabs",
            "https://github.com/SalluLabs",
            "https://linkedin.com/company/SalluLabs"
          ]
        }
        </script>
</head>
<body>
    <div class="wrapper">
        <h1>Sign Up</h1>
        <div id="success-message" class="success-message" style="display: none;"></div>
        <div id="error-message" class="error-message" style="display: none;"></div>
        
        <form id="signupForm">
            <div>
                <label for="firstname-input">
                    <i class="fa-solid fa-circle-user"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#white"><path d="M480-480q-66 0-113-47t-47-113q0-66 47-113t113-47q66 0 113 47t47 113q0 66-47 113t-113 47ZM160-160v-112q0-34 17.5-62.5T224-378q62-31 126-46.5T480-440q66 0 130 15.5T736-378q29 15 46.5 43.5T800-272v112H160Zm80-80h480v-32q0-11-5.5-20T700-306q-54-27-109-40.5T480-360q-56 0-111 13.5T260-306q-9 5-14.5 14t-5.5 20v32Zm240-320q33 0 56.5-23.5T560-640q0-33-23.5-56.5T480-720q-33 0-56.5 23.5T400-640q0 33 23.5 56.5T480-560Zm0-80Zm0 400Z"/></svg></i>
                </label>
                <input type="text" id="firstname-input" name="firstname" required placeholder="First Name">
            </div>

            <div>
                <label for="email-input">@</label>
                <input type="email" id="email-input" name="email" required placeholder="Email">
            </div>

            <div>
                <label for="password-input">
                    <i class="fas fa-lock"></i><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#white"><path d="M240-80q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640h40v-80q0-83 58.5-141.5T480-920q83 0 141.5 58.5T680-720v80h40q33 0 56.5 23.5T800-560v400q0 33-23.5 56.5T720-80H240Zm0-80h480v-400H240v400Zm240-120q33 0 56.5-23.5T560-360q0-33-23.5-56.5T480-440q-33 0-56.5 23.5T400-360q0 33 23.5 56.5T480-280ZM360-640h240v-80q0-50-35-85t-85-35q-50 0-85 35t-35 85v80ZM240-160v-400 400Z"/></svg>
                </label>
                <input type="password" id="password-input" name="password" required placeholder="Password">
            </div>

            <div>
                <label for="repeat-password-input">
                    <i class="fas fa-lock"></i><svg class="i" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#white"><path d="M480-480q-66 0-113-47t-47-113q0-66 47-113t113-47q66 0 113 47t47 113q0 66-47 113t-113 47ZM160-160v-112q0-34 17.5-62.5T224-378q62-31 126-46.5T480-440q66 0 130 15.5T736-378q29 15 46.5 43.5T800-272v112H160Zm80-80h480v-32q0-11-5.5-20T700-306q-54-27-109-40.5T480-360q-56 0-111 13.5T260-306q-9 5-14.5 14t-5.5 20v32Zm240-320q33 0 56.5-23.5T560-640q0-33-23.5-56.5T480-720q-33 0-56.5 23.5T400-640q0 33 23.5 56.5T480-560Zm0-80Zm0 400Z"/></svg>
                </label>
                <input type="password" id="repeat-password-input" name="repeat-password" required placeholder="Repeat Password">
            </div>

            <button type="submit">Sign Up</button>

            <button type="button" id="google-signup" class="google">
                Continue with Google
            </button>
        </form>

        <p>
            Already have an Account? <a href="/login">Login</a>
        </p>
        
        <div id="verification-instructions" style="display: none; margin-top: 20px; padding: 15px; background-color: #e7f3ff; border-radius: 5px;">
            <h3>Email Verification Required</h3>
            <p>We've sent a verification link to your email address. Please check your inbox and click the link to verify your account.</p>
            <p>Once verified, you'll be able to log in to your account.</p>
            <p><a href="#" id="resend-verification">Didn't receive the email? Click here to resend</a></p>
        </div>
    </div>
    <input type="hidden" id="invite-code" name="invite-code" value="{{ invite_code }}">
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Get invite code from URL if not already set
            const urlParams = new URLSearchParams(window.location.search);
            const inviteParam = urlParams.get('invite');
            
            const inviteCodeInput = document.getElementById('invite-code');
            if (inviteCodeInput && inviteParam && !inviteCodeInput.value) {
                inviteCodeInput.value = inviteParam;
            }
            
            // Resend verification event listener
            const resendLink = document.getElementById('resend-verification');
            if (resendLink) {
                resendLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    // This will be handled in the firebaseauth.js file
                    if (window.resendVerificationEmail) {
                        window.resendVerificationEmail();
                    }
                });
            }
        });
    </script>
    <script type="module" src="/static/firebaseauth.js"></script>
</body>
</html>
